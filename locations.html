<style>
    .locations-section {
        padding: 60px 20px;
        text-align: center;
        background-color: #fff;
    }

    .locations-section h2 {
        font-size: 2rem;
        margin-bottom: 10px;
        color: #1e0533;
    }

    .locations-section p {
        color: #666;
        margin-bottom: 40px;
    }

    .locations-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        max-width: 1000px;
        margin: 0 auto;
    }

    .loc-card {
        background: #fdfdfd;
        border: 1.5px solid #eee;
        border-radius: 15px;
        padding: 25px;
        transition: 0.3s;
        position: relative;
    }

    .loc-card:hover {
        border-color: #8e2de2;
        box-shadow: 0 5px 15px rgba(142, 45, 226, 0.1);
    }

    .flag-icon {
        font-size: 30px;
        margin-bottom: 15px;
        display: block;
    }

    .loc-name {
        font-weight: 700;
        font-size: 1.1rem;
        color: #333;
    }

    .loc-country {
        color: #777;
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    /* Availability Badges */
    .status {
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        display: inline-block;
    }

    .available {
        background: #f3e8ff;
        color: #8e2de2;
    }

    .out-of-stock {
        background: #fee2e2;
        color: #ef4444;
    }
</style>

<section class="locations-section">
    <h2>Global Server Locations</h2>
    <p>Choose from our premium data centers worldwide for optimal performance</p>

    <div class="locations-grid">
        <div class="loc-card">
            <span class="flag-icon">🇩🇪</span>
            <div class="loc-name">Nuremberg</div>
            <div class="loc-country">Germany</div>
            <span class="status available">Available</span>
        </div>

        <div class="loc-card">
            <span class="flag-icon">🇫🇮</span>
            <div class="loc-name">Helsinki</div>
            <div class="loc-country">Finland</div>
            <span class="status available">Available</span>
        </div>

        <div class="loc-card">
            <span class="flag-icon">🇮🇳</span>
            <div class="loc-name">Mumbai</div>
            <div class="loc-country">India</div>
            <span class="status out-of-stock">Out of Stock</span>
        </div>

        <div class="loc-card">
            <span class="flag-icon">🇺🇸</span>
            <div class="loc-name">Hillsboro</div>
            <div class="loc-country">USA</div>
            <span class="status out-of-stock">Out of Stock</span>
        </div>
    </div>
</section>
